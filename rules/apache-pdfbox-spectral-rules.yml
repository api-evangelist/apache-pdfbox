extends: "spectral:oas"
rules:
  info-title-required:
    severity: error
    given: "$.info"
    then:
      field: title
      function: truthy
  operation-summary-required:
    severity: error
    given: "$.paths[*][*]"
    then:
      field: summary
      function: truthy
  operation-operationId-required:
    severity: error
    given: "$.paths[*][*]"
    then:
      field: operationId
      function: truthy
  operation-summary-apache-prefix:
    description: "Summaries should start with Apache PDFBox"
    severity: info
    given: "$.paths[*][get,post,put,delete,patch].summary"
    then:
      function: pattern
      functionOptions:
        match: "^Apache PDFBox"
  paths-document-resource:
    description: "Document paths should follow /documents pattern"
    severity: info
    given: "$.paths[*]~"
    then:
      function: pattern
      functionOptions:
        match: "^/documents"
  response-success-required:
    severity: error
    given: "$.paths[*][get,post,put].responses"
    then:
      function: schema
      functionOptions:
        schema:
          required: ["200"]
