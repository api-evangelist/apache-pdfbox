openapi: 3.0.3
info:
  title: Apache PDFBox API
  description: Apache PDFBox is an open-source Java library for working with PDF documents. This API represents the REST service interface for PDF creation, manipulation, text extraction, and digital signatures.
  version: 3.0.0
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  contact:
    url: https://pdfbox.apache.org/
x-generated-from: documentation
servers:
  - url: https://{host}/pdfbox
    description: Apache PDFBox REST service
    variables:
      host:
        default: localhost:8080
paths:
  /documents:
    post:
      operationId: createDocument
      summary: Apache PDFBox Create Document
      description: Create a new empty PDF document.
      tags: [Documents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDocumentRequest'
      responses:
        '200':
          description: Document created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentInfo'
      x-microcks-operation: {delay: 0, dispatcher: FALLBACK}
  /documents/{documentId}/text:
    get:
      operationId: extractText
      summary: Apache PDFBox Extract Text
      description: Extract plain text from a PDF document.
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/documentId'
        - name: startPage
          in: query
          schema:
            type: integer
          description: Start page number (1-based)
        - name: endPage
          in: query
          schema:
            type: integer
          description: End page number (inclusive)
      responses:
        '200':
          description: Extracted text
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TextExtractionResult'
      x-microcks-operation: {delay: 0, dispatcher: FALLBACK}
  /documents/{documentId}/pages:
    get:
      operationId: listPages
      summary: Apache PDFBox List Pages
      description: List all pages in a PDF document with metadata.
      tags: [Pages]
      parameters:
        - $ref: '#/components/parameters/documentId'
      responses:
        '200':
          description: List of pages
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PageList'
      x-microcks-operation: {delay: 0, dispatcher: FALLBACK}
  /documents/{documentId}/metadata:
    get:
      operationId: getMetadata
      summary: Apache PDFBox Get Metadata
      description: Get PDF document metadata including title, author, creation date.
      tags: [Documents]
      parameters:
        - $ref: '#/components/parameters/documentId'
      responses:
        '200':
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentMetadata'
      x-microcks-operation: {delay: 0, dispatcher: FALLBACK}
  /documents/{documentId}/merge:
    post:
      operationId: mergeDocuments
      summary: Apache PDFBox Merge Documents
      description: Merge multiple PDF documents into one.
      tags: [Operations]
      parameters:
        - $ref: '#/components/parameters/documentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MergeRequest'
      responses:
        '200':
          description: Merged document info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentInfo'
      x-microcks-operation: {delay: 0, dispatcher: FALLBACK}
  /documents/{documentId}/split:
    post:
      operationId: splitDocument
      summary: Apache PDFBox Split Document
      description: Split a PDF document into multiple parts.
      tags: [Operations]
      parameters:
        - $ref: '#/components/parameters/documentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SplitRequest'
      responses:
        '200':
          description: Split documents info
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentInfo'
      x-microcks-operation: {delay: 0, dispatcher: FALLBACK}
  /documents/{documentId}/sign:
    post:
      operationId: signDocument
      summary: Apache PDFBox Sign Document
      description: Apply a digital signature to a PDF document.
      tags: [Signatures]
      parameters:
        - $ref: '#/components/parameters/documentId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignRequest'
      responses:
        '200':
          description: Signed document info
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentInfo'
      x-microcks-operation: {delay: 0, dispatcher: FALLBACK}
  /documents/{documentId}/forms:
    get:
      operationId: getFormFields
      summary: Apache PDFBox Get Form Fields
      description: Get all interactive form fields (AcroForm) from a PDF document.
      tags: [Forms]
      parameters:
        - $ref: '#/components/parameters/documentId'
      responses:
        '200':
          description: List of form fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FormFields'
      x-microcks-operation: {delay: 0, dispatcher: FALLBACK}
components:
  parameters:
    documentId:
      name: documentId
      in: path
      required: true
      schema:
        type: string
      description: Document identifier
      example: doc-abc123
  schemas:
    CreateDocumentRequest:
      type: object
      properties:
        title:
          type: string
          example: My Document
        author:
          type: string
          example: John Smith
        pageSize:
          type: string
          example: A4
          enum: [A4, LETTER, LEGAL, A3, A5]
    DocumentInfo:
      type: object
      properties:
        documentId:
          type: string
          example: doc-abc123
        title:
          type: string
          example: My Document
        pageCount:
          type: integer
          example: 10
        fileSize:
          type: integer
          example: 204800
        version:
          type: string
          example: "1.4"
    TextExtractionResult:
      type: object
      properties:
        documentId:
          type: string
          example: doc-abc123
        text:
          type: string
          example: "This is extracted text from the PDF document."
        pageCount:
          type: integer
          example: 5
        wordCount:
          type: integer
          example: 1234
    PageList:
      type: object
      properties:
        documentId:
          type: string
          example: doc-abc123
        totalPages:
          type: integer
          example: 10
        pages:
          type: array
          items:
            $ref: '#/components/schemas/PageInfo'
    PageInfo:
      type: object
      properties:
        pageNumber:
          type: integer
          example: 1
        width:
          type: number
          example: 595.0
        height:
          type: number
          example: 842.0
        rotation:
          type: integer
          example: 0
    DocumentMetadata:
      type: object
      properties:
        title:
          type: string
          example: Annual Report 2026
        author:
          type: string
          example: Jane Doe
        subject:
          type: string
          example: Financial Summary
        creator:
          type: string
          example: Apache PDFBox
        producer:
          type: string
          example: Apache PDFBox
        creationDate:
          type: string
          format: date-time
          example: "2026-04-19T10:00:00Z"
        modificationDate:
          type: string
          format: date-time
          example: "2026-04-19T11:00:00Z"
    MergeRequest:
      type: object
      properties:
        sourceDocumentIds:
          type: array
          items:
            type: string
          example: ["doc-001", "doc-002"]
        outputTitle:
          type: string
          example: Merged Document
    SplitRequest:
      type: object
      properties:
        splitAtPages:
          type: array
          items:
            type: integer
          description: Page numbers at which to split
          example: [5, 10]
    SignRequest:
      type: object
      properties:
        keystorePath:
          type: string
          example: keystore.p12
        password:
          type: string
          example: keystore-password
        reason:
          type: string
          example: Document approval
        location:
          type: string
          example: San Francisco, CA
    FormFields:
      type: object
      properties:
        documentId:
          type: string
          example: doc-abc123
        fields:
          type: array
          items:
            $ref: '#/components/schemas/FormField'
    FormField:
      type: object
      properties:
        name:
          type: string
          example: firstName
        type:
          type: string
          example: PDTextField
          enum: [PDTextField, PDCheckBox, PDRadioButton, PDComboBox, PDListBox, PDSignatureField]
        value:
          type: string
          example: John
        required:
          type: boolean
          example: false
