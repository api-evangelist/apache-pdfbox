aid: apache-pdfbox
name: Apache PDFBox
description: >-
  Apache PDFBox is an open-source Java library for working with PDF documents. It allows creation of new PDF documents, manipulation of existing documents, and the ability to extract content from documents
  with support for digital signatures.
